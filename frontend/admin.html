<!DOCTYPE html>
<html>

<head>
<title>PS-CRM Command Center</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>PS-CRM Command Center</h1>
<p class="subtitle">Real-Time Civic Complaint Monitoring System</p>

<!-- STATS -->
<div class="stats">
  <div class="stat-box">
    <h2 id="total">0</h2>
    <p>Total</p>
  </div>
  <div class="stat-box pending">
    <h2 id="pending">0</h2>
    <p>Pending</p>
  </div>
  <div class="stat-box completed">
    <h2 id="completed">0</h2>
    <p>Completed</p>
  </div>
</div>

<input id="search" placeholder="Search complaints...">

<select id="statusFilter">
<option value="All">All</option>
<option value="Pending">Pending</option>
<option value="Completed">Completed</option>
</select>

<div id="loading">Loading complaints...</div>
<div id="complaints"></div>

<script>

const API = "https://pscrm-project.onrender.com"

async function loadComplaints(){

document.getElementById("loading").style.display = "block"

const res = await fetch(API + "/complaints")
const data = await res.json()

document.getElementById("loading").style.display = "none"

const search = document.getElementById("search").value.toLowerCase()
const statusFilter = document.getElementById("statusFilter").value

let total = data.length
let pending = data.filter(c => c.status === "Pending").length
let completed = data.filter(c => c.status === "Completed").length

document.getElementById("total").innerText = total
document.getElementById("pending").innerText = pending
document.getElementById("completed").innerText = completed

const filtered = data.filter(c => {

return (
(statusFilter==="All" || c.status===statusFilter) &&
(
c.name.toLowerCase().includes(search) ||
c.location.toLowerCase().includes(search) ||
c.category.toLowerCase().includes(search)
)
)

})

const container = document.getElementById("complaints")
container.innerHTML=""

if(filtered.length === 0){
container.innerHTML = "<p>No complaints found</p>"
return
}

filtered.forEach(c=>{

const statusColor = c.status === "Completed" ? "green" : "red"

const div = document.createElement("div")
div.className="card"

div.innerHTML=`

<h3>${c.issue}</h3>

<p><b>ID:</b> ${c.complaintId}</p>

<p><b>Name:</b> ${c.name}</p>

<p><b>Category:</b> ${c.category}</p>

<p><b>Location:</b> ${c.location}</p>

<p style="color:${statusColor};"><b>Status:</b> ${c.status}</p>

<img src="${c.image}" width="200"/>

<select onchange="updateStatus('${c._id}',this.value)">
<option value="Pending">Pending</option>
<option value="Completed">Completed</option>
</select>

`

container.appendChild(div)

})

}

async function updateStatus(id,status){

await fetch(API + "/update/" + id,{
method:"PUT",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({status})
})

loadComplaints()

}

document.getElementById("search").addEventListener("input",loadComplaints)
document.getElementById("statusFilter").addEventListener("change",loadComplaints)

loadComplaints()

</script>

</body>
</html>
